<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - NutriDetect</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <a href="{{ url_for('main.home') }}" class="navbar-brand">
            <i class="fas fa-leaf"></i> NutriDetect
        </a>
        <ul class="navbar-menu">
            <li><a href="{{ url_for('main.home') }}">Home</a></li>
            <li><a href="{{ url_for('main.login_page') }}" style="color: var(--primary); font-weight: 600;">Login</a></li>
        </ul>
    </nav>

    <main style="margin-top: 80px; min-height: calc(100vh - 80px); display: flex; align-items: center; justify-content: center; padding: 2rem;">
        <section class="nutri-panel" style="width: 100%; max-width: 460px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 2.5rem; box-shadow: 0 20px 60px rgba(0, 212, 255, 0.2);">
            <div style="text-align: center; margin-bottom: 2rem;">
                <i class="fas fa-key" style="font-size: 2.8rem; color: var(--primary); margin-bottom: 1rem;"></i>
                <h1 style="font-size: 2rem; font-weight: 900; color: var(--primary); margin-bottom: 0.5rem;">Forgot Password</h1>
                <p style="color: #a0a0a0;">Enter your email and we will send you a password reset link. For local testing, keep this app running and open the link on this same computer.</p>
            </div>

            <form method="POST" action="{{ url_for('main.forgot_password') }}">
                <div class="nutri-stagger">
                    <label style="display: block; color: #e0e0e0; font-weight: 600; margin-bottom: 0.5rem;">Email Address</label>
                    <input class="nutri-field" type="email" name="email" placeholder="you@example.com" required style="width: 100%; padding: 1rem 1.1rem; background: rgba(0, 212, 255, 0.05); border: 2px solid var(--border-color); border-radius: 12px; color: #e0e0e0; margin-bottom: 1.5rem;">
                </div>
                <button class="nutri-submit nutri-stagger" type="submit" style="width: 100%; padding: 1rem; border: none; border-radius: 12px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: var(--dark-bg); font-weight: 800; cursor: pointer;">
                    <i class="fas fa-paper-plane"></i> Send Reset Link
                </button>
            </form>

            <div style="margin-top: 1.5rem; text-align: center; color: #a0a0a0;">
                Remembered your password?
                <a href="{{ url_for('main.login_page') }}" style="color: var(--primary); text-decoration: none; font-weight: 700;">Back to Login</a>
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
{% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
        {% if category == 'success' or category == 'danger' %}
            showNutriAlert(
                "{{ 'success' if category == 'success' else 'error' }}",
                "{{ 'Success!' if category == 'success' else 'Error!' }}",
                "{{ message }}"
            );
        {% endif %}
    {% endfor %}
{% endwith %}
    </script>
</body>
</html>
